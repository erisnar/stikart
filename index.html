<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stikart</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="filter-bar">
        <button id="regenerate-colors-btn" onclick="regenerateColors()">🎨</button>
        <select id="month-select" onchange="filterByMonth(this.value === '' ? null : parseInt(this.value))">
            <option value="">Alle måneder</option>
            <option value="0">Januar</option>
            <option value="1">Februar</option>
            <option value="2">Mars</option>
            <option value="3">April</option>
            <option value="4">Mai</option>
            <option value="5">Juni</option>
            <option value="6">Juli</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">Oktober</option>
            <option value="10">November</option>
            <option value="11">Desember</option>
        </select>
        <select id="category-select" onchange="filterByCategory(this.value === '' ? null : this.value)">
            <option value="">Alle distanser</option>
            <option value="marathon-trail">&lt;50K</option>
            <option value="50k">50K</option>
            <option value="50-miles">50 Miles</option>
            <option value="100k">100K</option>
            <option value="100-miles">100 Miles</option>
            <option value="100-miles-plus">100 Miles+</option>
        </select>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- GPX parser -->
    <script src="gpx-parser.js"></script>

    <script src="app.js"></script>
</body>
</html>
